services:
  - type: web
    name: zhangxuefeng-quiz
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: ANTHROPIC_AUTH_TOKEN
        sync: false
      - key: ANTHROPIC_DEFAULT_SONNET_MODEL
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.12"
